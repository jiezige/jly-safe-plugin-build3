name: Build iOS dylib

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install Theos
        run: |
          brew install ldid-procursus
          command -v ldid
          git clone --recursive https://github.com/theos/theos.git "$HOME/theos"
          echo "THEOS=$HOME/theos" >> "$GITHUB_ENV"

      - name: Build dylib
        run: |
          make clean
          make FINALPACKAGE=1

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          find .theos -name "JLYSafePlugin.dylib" -type f -print -exec file {} \;
          cp .theos/obj/JLYSafePlugin.dylib artifacts/cike.dylib
          file artifacts/cike.dylib
          find packages -name "*.deb" -type f -exec cp {} artifacts/ \; || true
          test -f artifacts/cike.dylib

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: JLYSafePlugin-ios
          path: artifacts/*
