name: Build patched IPA

on:
  workflow_dispatch:
    inputs:
      input_ipa:
        description: Input IPA path in the repository
        default: miaotaoGOm0492_303_fixed.ipa
        required: true
      input_ipa_release_asset:
        description: Release asset name to download when input_ipa is not in the repository
        default: miaotaoGOm0492_303_fixed.ipa
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download input IPA from release asset
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_IPA: ${{ inputs.input_ipa }}
          ASSET_NAME: ${{ inputs.input_ipa_release_asset }}
        run: |
          if [[ -f "$INPUT_IPA" ]]; then
            echo "Using repository IPA: $INPUT_IPA"
            exit 0
          fi

          echo "Downloading release asset: $ASSET_NAME"
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GH_TOKEN"]
          asset_name = os.environ["ASSET_NAME"]
          output = os.environ["INPUT_IPA"]
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "jly-ipa-build",
          }

          req = urllib.request.Request(f"https://api.github.com/repos/{repo}/releases", headers=headers)
          releases = json.load(urllib.request.urlopen(req))
          for release in releases:
              for asset in release.get("assets", []):
                  if asset.get("name") == asset_name:
                      download_headers = dict(headers)
                      download_headers["Accept"] = "application/octet-stream"
                      dl_req = urllib.request.Request(asset["url"], headers=download_headers)
                      with urllib.request.urlopen(dl_req) as response, open(output, "wb") as fh:
                          fh.write(response.read())
                      print(f"Downloaded {asset_name} to {output}")
                      raise SystemExit(0)
          raise SystemExit(f"Release asset not found: {asset_name}")
          PY

      - name: Build patched IPA
        env:
          SIGNING_CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
          MOBILEPROVISION_BASE64: ${{ secrets.MOBILEPROVISION_BASE64 }}
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
        run: |
          chmod +x scripts/resign_ipa_macos.sh
          scripts/resign_ipa_macos.sh "${{ inputs.input_ipa }}" dist/miaotaoGOm0492_303_cf.ipa

      - name: Verify patched host
        run: |
          unzip -q dist/miaotaoGOm0492_303_cf.ipa -d verify
          if ! strings verify/Payload/*.app/cike.dylib | grep -q 'https://pee.jlyapp.cn'; then
            echo 'patched host not found'
            exit 1
          fi
          if strings verify/Payload/*.app/cike.dylib | grep -q 'https://api.jlyapp.cn'; then
            echo 'old host still present'
            exit 1
          fi
          if strings verify/Payload/*.app/cike.dylib | grep -q 'https://stz.jlyapp.cn'; then
            echo 'old static host still present'
            exit 1
          fi
          if ! strings verify/Payload/*.app/cike.dylib | grep -q '/api/posts/all-app-list'; then
            echo 'all-app-list endpoint not found'
            exit 1
          fi
          if ! strings verify/Payload/*.app/cike.dylib | grep -q '/api/posts/app-list'; then
            echo 'original app-list endpoint was not preserved'
            exit 1
          fi
          if ! test -f verify/Payload/*.app/JLYSearchAddon.dylib; then
            echo 'search addon dylib not embedded'
            exit 1
          fi
          APP_BIN="$(/usr/libexec/PlistBuddy -c 'Print CFBundleExecutable' verify/Payload/*.app/Info.plist)"
          if ! otool -l "verify/Payload/"*.app/"$APP_BIN" | grep -q '@executable_path/JLYSearchAddon.dylib'; then
            echo 'search addon load command not found'
            exit 1
          fi
          if ! strings verify/Payload/*.app/JLYSearchAddon.dylib | grep -q 'https://pee.jlyapp.cn/vip1/meet-list'; then
            echo 'meet-list route endpoint not found in addon'
            exit 1
          fi
          if ! strings verify/Payload/*.app/JLYSearchAddon.dylib | grep -q 'sm/meet/getmeetlist'; then
            echo 'meet-list detector not found in addon'
            exit 1
          fi

      - name: Publish patched IPA release asset
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          TAG: patched-meet
          ASSET_NAME: miaotaoGOm0492_303_cf_meet.ipa
          ASSET_PATH: dist/miaotaoGOm0492_303_cf.ipa
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.error
          import urllib.parse
          import urllib.request

          repo = os.environ["REPO"]
          token = os.environ["GH_TOKEN"]
          tag = os.environ["TAG"]
          asset_name = os.environ["ASSET_NAME"]
          asset_path = os.environ["ASSET_PATH"]
          api = f"https://api.github.com/repos/{repo}"
          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "jly-ipa-release",
          }

          def request(url, method="GET", data=None, extra_headers=None):
              req = urllib.request.Request(
                  url,
                  data=data,
                  method=method,
                  headers={**headers, **(extra_headers or {})},
              )
              with urllib.request.urlopen(req) as response:
                  body = response.read()
                  return json.loads(body.decode()) if body else None

          try:
              release = request(f"{api}/releases/tags/{tag}")
          except urllib.error.HTTPError as exc:
              if exc.code != 404:
                  raise
              release = request(
                  f"{api}/releases",
                  method="POST",
                  data=json.dumps({
                      "tag_name": tag,
                      "name": "Patched meet IPA",
                      "body": "Latest IPA with APK-style meet-list authorization routing.",
                      "draft": False,
                      "prerelease": False,
                  }).encode(),
                  extra_headers={"Content-Type": "application/json"},
              )

          for asset in release.get("assets", []):
              if asset.get("name") == asset_name:
                  request(asset["url"], method="DELETE")
                  break

          upload_url = release["upload_url"].split("{", 1)[0]
          upload_url += "?" + urllib.parse.urlencode({"name": asset_name})
          with open(asset_path, "rb") as fh:
              data = fh.read()
          uploaded = request(
              upload_url,
              method="POST",
              data=data,
              extra_headers={"Content-Type": "application/octet-stream"},
          )
          print(uploaded["browser_download_url"])
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: miaotaoGOm0492_303_cf
          path: dist/miaotaoGOm0492_303_cf.ipa
